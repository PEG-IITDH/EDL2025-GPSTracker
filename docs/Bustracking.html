<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bus Tracking System – IIT Dharwad</title>

  <!-- Instant redirect to Main Menu -->
  <meta http-equiv="refresh" content="0; url=HTML/Main_Menu.html">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f4f0f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #333;
    }
    .msg {
      text-align: center;
      padding: 32px;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #e0d0e1;
      border-top-color: #89288f;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 18px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { font-size: 1rem; color: #555; }
    a { color: #89288f; font-weight: 600; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="msg">
    <div class="spinner"></div>
    <p>Redirecting to <a href="HTML/Main_Menu.html">Main Menu</a>…</p>
  </div>

  <script>
    // JS fallback in case meta-refresh is blocked
    window.location.replace("HTML/Main_Menu.html");
  </script>
</body>
</html>
