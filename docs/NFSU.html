  <script>
    const STOP_NAME = "Jubilee Circle";
    const STOP_LAT  = 15.459100;
    const STOP_LNG  = 75.007806;
    const STOP_ZOOM = 14;

    // ── Map ─────────────────────────────────────────────────
    var map = L.map('map').setView([STOP_LAT, STOP_LNG], STOP_ZOOM);
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19, attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    let tailMarkerGroup = L.layerGroup().addTo(map);
    var busMarker = null;

    // Static stop marker for this stop
    var stopMarker = L.marker([STOP_LAT, STOP_LNG]).addTo(map);
    stopMarker.bindPopup("<b>" + STOP_NAME + "</b>").openPopup();

    // ── Main update ──────────────────────────────────────────  // calculateDistance + getZoomLevel are now in schedule.js
    function updateMapData() {
      fetch('https://api.thingspeak.com/channels/2500568/feeds.json?api_key=3TVTGFNPIZH5T08Y&results=5')
        .then(r => r.json())
        .then(data => {
          const feeds = data.feeds
            .slice(-5)
            .sort((a, b) => new Date(a.created_at) - new Date(b.created_at))
            .map(f => ({
              latitude:  parseFloat(f.field1),
              longitude: parseFloat(f.field2),
              speed:     parseInt(f.field3, 10),
              timestamp: f.created_at
            }));

          const latest = feeds[feeds.length - 1];

          // Fix 3: guard against null/missing GPS fields (device offline or bad upload)
          if (!isFinite(latest.latitude) || !isFinite(latest.longitude)) {
            document.getElementById("lastUpdate").innerText = "GPS signal lost — retrying…";
            document.getElementById("Status").innerText = "No Signal";
            return;
          }

          // Fading trail (oldest = most transparent)
          tailMarkerGroup.clearLayers();
          feeds.slice(0,4).forEach((entry, i) => {
            if (!isFinite(entry.latitude) || !isFinite(entry.longitude)) return;
            const icon = L.divIcon({
              html: `<div style="font-size:18px;opacity:${TRAIL_OPACITIES[i]}">🔹</div>`,
              iconSize: [24,24], iconAnchor: [12,12]
            });
            L.marker([entry.latitude, entry.longitude], { icon }).addTo(tailMarkerGroup);
          });

          const lat = latest.latitude, lon = latest.longitude, spd = latest.speed;
          const speedStr = isFinite(spd) ? spd + " km/h" : "—";  // Fix 3: guard NaN speed
          const lastUpdatedIST = utcToISTString(latest.timestamp);

          // FIX: real wall-clock IST — not GPS timestamp
          const { timeStr: currentISTTime, dayName, dateKey } = getCurrentIST();
          const nowSec = timeToSeconds(currentISTTime);

          // FIX: pick schedule accounting for institute holidays too
          const schedule = getTodaySchedule();
          const isWeekendOrHoliday = (dayName === "Saturday" || dayName === "Sunday"
                                      || INSTITUTE_HOLIDAYS_2026.has(dateKey));

          // FIX: getUpcomingBuses uses currentISTTime (wall clock) inside schedule.js
          const upcoming = getUpcomingBuses(schedule, STOP_NAME).filter(b => b.dest !== "End of route");

          let trip1 = "", trip2 = "", trip3 = "", flag = 0;
          const firstSec = timeToSeconds(scheduleFirstTime(schedule));
          const lastSec  = timeToSeconds(scheduleLastTime(schedule));

          // FIX: closed check uses stop_thatday (schedule), not hardcoded weekday array
          // FIX: closed message matches the real next-start time for the schedule type
          if (nowSec < firstSec || nowSec > lastSec) {
            // Fix 2: check tomorrow's schedule type, not today's
            trip1 = `Shuttle service is closed. The next bus will start from ${getTomorrowStartTime()}`;
            flag = 1;
          } else if (upcoming.length === 0) {
            // Jubilee Circle is not served on weekends or institute holidays
            const { dayName, dateKey } = getCurrentIST();
            const isWeekendOrHoliday = dayName === "Saturday" || dayName === "Sunday"
                                       || INSTITUTE_HOLIDAYS_2026.has(dateKey);
            trip1 = isWeekendOrHoliday
              ? "This stop is not served on weekends and institute holidays"
              : "No more buses today";
            flag = 1;
          } else {
            if (upcoming.length > 0) trip1 = `${upcoming[0].timeLabel} (at ${upcoming[0].scheduledTime.slice(0,5)}) → ${upcoming[0].dest}`;
            if (upcoming.length > 1) trip2 = `${upcoming[1].timeLabel} (at ${upcoming[1].scheduledTime.slice(0,5)}) → ${upcoming[1].dest}`;
            if (upcoming.length > 2) trip3 = `${upcoming[2].timeLabel} (at ${upcoming[2].scheduledTime.slice(0,5)}) → ${upcoming[2].dest}`;
          }

          // Bus marker + zoom
          if (busMarker) map.removeLayer(busMarker);
          const busIcon = L.divIcon({
            html: '<div style="font-size:24px;line-height:30px;text-align:center;">🚍</div>',
            className: 'emoji-marker', iconSize: [60,60], iconAnchor: [15,15]
          });
          busMarker = L.marker([lat, lon], { icon: busIcon }).addTo(map);
          const dist = calculateDistance(lat, lon, STOP_LAT, STOP_LNG);
          if (!userPanning) map.setView([lat, lon], getZoomLevel(dist));  // Fix 8: respect user pan

          // FIX: repair-message fetch async-correct — status set INSIDE .then()
          fetch('https://api.thingspeak.com/channels/2882525/feeds.json?api_key=ONUVVE8QBZ5GH9ZP&results=1')
            .then(r => r.json())
            .then(data1 => {
              // FIX: midnight-safe stale check via raw ms
              const stale = isGPSStale(latest.timestamp, 130);
              let statu = stale ? "Parked" : "Live";
              const repMsg = (data1.feeds && data1.feeds.length > 0) ? (data1.feeds[0].field1 || "") : "";
              if (repMsg !== "" && repMsg.toUpperCase() !== "OK") statu = repMsg;

              const statusEl = document.getElementById("Status");
              statusEl.innerText = statu;
              if (statu === "Live") {
                statusEl.classList.remove("updated-time-not-live");
                statusEl.classList.add("updated-time");
                statusEl.style.color = "#188038";
              } else {
                statusEl.classList.remove("updated-time");
                statusEl.classList.add("updated-time-not-live");
                statusEl.style.color = "#c47a00";
              }
            })
            .catch(() => {
              const stale = isGPSStale(latest.timestamp, 130);
              const statu = stale ? "Parked" : "Live";
              const statusEl = document.getElementById("Status");
              statusEl.innerText = statu;
              statusEl.style.color = statu === "Live" ? "#188038" : "#c47a00";
            });

          // Update DOM
          document.getElementById("lastUpdate").innerText = lastUpdatedIST;
          document.getElementById("Speed").innerText = speedStr;

          const ns = document.getElementById("Nextstop");
          ns.innerText = trip1;
          document.getElementById("next1stop").innerText  = trip2;
          document.getElementById("next2stops").innerText = trip3;

          const hd = document.getElementById("heading");
          if (flag) {
            hd.classList.add("yes");
            ns.style.color = "#802485";
          } else {
            hd.classList.remove("yes");
            ns.style.color = "";
          }
        })
        .catch(err => {
          console.error('Fetch Error:', err);
          document.getElementById("lastUpdate").innerText = "Error loading update.";
          document.getElementById("Status").innerText = "Error loading update.";
          document.getElementById("Speed").innerText = "Error fetching speed.";
          document.getElementById("Nextstop").innerText = "Error retrieving next bus.";
        });
    }

    // Fix 8: track user map interaction so auto-pan doesn't interrupt manual browsing
    let userPanning = false;
    map.on('dragstart zoomstart', () => { userPanning = true; });
    map.on('dragend zoomend', () => { setTimeout(() => { userPanning = false; }, 5000); });;

    updateMapData();
    setInterval(updateMapData, 20000);
  </script>
