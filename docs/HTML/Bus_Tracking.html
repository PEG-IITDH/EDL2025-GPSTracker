  <script>
    // ── Map setup ────────────────────────────────────────────
    var map = L.map('map').setView([15.484624, 74.936509], 13);
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19, attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    let tailMarkerGroup = L.layerGroup().addTo(map);
    var busMarker = null;

    // ── Static stop markers ──────────────────────────────────
    var stopIcon = L.divIcon({
      html: '<div style="font-size:24px;line-height:30px;text-align:center;">🚏</div>',
      className: 'stop-marker', iconSize: [20,20], iconAnchor: [15,15]
    });
    Object.entries(STOP_COORDS).forEach(([label, c]) => {
      const m = L.marker([c.lat, c.lng], { icon: stopIcon }).addTo(map);
      const popup = L.popup({ closeOnClick: true, autoClose: false })
        .setContent(`<div style="font-size:14px;font-weight:500;font-family:'Roboto',sans-serif;padding:2px 4px;color:#202124;">${label}</div>`);
      m.bindPopup(popup).openPopup();
    });

    // ── Alert preferences (in-memory; localStorage used as best-effort cache) ──
    // Wrapped in try/catch because localStorage is blocked in private/iOS modes.
    function lsGet(key) {
      try { return localStorage.getItem(key) || ''; } catch(e) { return ''; }
    }
    function lsSet(key, val) {
      try { localStorage.setItem(key, val); } catch(e) { /* storage blocked — silent */ }
    }

    let userPreferences = {
      fromLocation: lsGet('fromLocation'),
      toLocation:   lsGet('toLocation'),
      alertShown:   false
    };
    if (userPreferences.fromLocation) document.getElementById('fromLocation').value = userPreferences.fromLocation;
    if (userPreferences.toLocation)   document.getElementById('toLocation').value   = userPreferences.toLocation;

    const alertModal   = document.getElementById('alertModal');
    const alertMessage = document.getElementById('alertMessage');
    document.getElementById('closeAlert').addEventListener('click', () => { alertModal.style.display = 'none'; });
    alertModal.addEventListener('click', (e) => { if (e.target === alertModal) alertModal.style.display = 'none'; });

    document.getElementById('savePreferences').addEventListener('click', () => {
      const from = document.getElementById('fromLocation').value;
      const to   = document.getElementById('toLocation').value;
      if (from && to && from === to) {
        alert('"From" and "To" locations must be different.');
        return;
      }
      userPreferences.fromLocation = from;
      userPreferences.toLocation   = to;
      userPreferences.alertShown   = false;
      lsSet('fromLocation', from);
      lsSet('toLocation',   to);
      if (from && to) {
        alert('Preferences saved! You will receive alerts when the bus is approaching your selected locations.');
      } else {
        alert('Please select both "From" and "To" locations.');
      }
    });

    function showAlert(message) {
      if (!userPreferences.alertShown) {
        alertMessage.textContent = message;
        alertModal.style.display = 'block';
        userPreferences.alertShown = true;
        setTimeout(() => { userPreferences.alertShown = false; }, 300000);
      }
    }

    // ── Alert check — trip-direction-aware ───────────────────
    // Finds fromIndex entries and verifies the toStop appears LATER in the
    // SAME trip (i.e. between fromIndex and the next re-occurrence of fromStop
    // at an equal-or-earlier time, which marks a new trip).
    function checkForUserAlert(schedule) {
      if (!userPreferences.fromLocation || !userPreferences.toLocation) return;
      const { timeStr } = getCurrentIST();
      const nowSec = timeToSeconds(timeStr);

      for (let fi = 0; fi < schedule.length; fi++) {
        if (schedule[fi].name !== userPreferences.fromLocation) continue;
        const fromSec = timeToSeconds(schedule[fi].time);

        // Find the end of this trip: the next entry with the same stop name at
        // an equal-or-earlier time is the start of a new trip.
        let tripEnd = schedule.length;
        for (let k = fi + 1; k < schedule.length; k++) {
          if (schedule[k].name === userPreferences.fromLocation &&
              timeToSeconds(schedule[k].time) <= fromSec) {
            tripEnd = k;
            break;
          }
        }

        // Check that toLocation exists within this same trip
        const toExists = schedule.slice(fi + 1, tripEnd)
          .some(s => s.name === userPreferences.toLocation);
        if (!toExists) continue;

        if (nowSec >= (fromSec - 600) && nowSec < fromSec) {
          const minAway = Math.ceil((fromSec - nowSec) / 60);
          showAlert(`Bus will arrive at ${userPreferences.fromLocation} in ${minAway} minutes, heading to ${userPreferences.toLocation}.`);
          return;
        } else if (nowSec >= fromSec && nowSec < fromSec + 60) {
          showAlert(`Bus has arrived at ${userPreferences.fromLocation}.`);
          return;
        }
      }
    }

    // ── Main update loop ─────────────────────────────────────
    function updateMapData() {
      fetch('https://api.thingspeak.com/channels/2500568/feeds.json?api_key=3TVTGFNPIZH5T08Y&results=5')
        .then(r => r.json())
        .then(data => {
          // FIX: guard against missing/empty feeds (ThingSpeak error or new channel)
          if (!data || !data.feeds || data.feeds.length === 0) {
            document.getElementById("lastUpdate").innerText = "No data — retrying…";
            document.getElementById("Status").innerText = "No Signal";
            return;
          }

          // FIX: sort first, then take last 5 — avoids taking wrong entries if API returns out-of-order
          const feeds = data.feeds
            .sort((a, b) => new Date(a.created_at) - new Date(b.created_at))
            .slice(-5)
            .map(f => ({
              latitude:  parseFloat(f.field1),
              longitude: parseFloat(f.field2),
              speed:     parseInt(f.field3, 10),
              timestamp: f.created_at
            }));

          const latest = feeds[feeds.length - 1];

          if (!isFinite(latest.latitude) || !isFinite(latest.longitude)) {
            document.getElementById("lastUpdate").innerText = "GPS signal lost — retrying…";
            document.getElementById("Status").innerText = "No Signal";
            return;
          }

          // ── Draw fading trail ────────────────────────────────
          tailMarkerGroup.clearLayers();
          feeds.slice(0, 4).forEach((entry, i) => {
            if (!isFinite(entry.latitude) || !isFinite(entry.longitude)) return;
            const icon = L.divIcon({
              html: `<div style="font-size:18px;opacity:${TRAIL_OPACITIES[i]}">🔹</div>`,
              iconSize: [24,24], iconAnchor: [12,12]
            });
            L.marker([entry.latitude, entry.longitude], { icon }).addTo(tailMarkerGroup);
          });

          const lat = latest.latitude, lon = latest.longitude;
          const spd = latest.speed;
          const speedStr = isFinite(spd) ? spd + " km/h" : "—";
          const lastUpdatedIST = utcToISTString(latest.timestamp);

          // ── Real wall-clock IST time ─────────────────────────
          const { timeStr: currentISTTime } = getCurrentIST();
          const schedule = getTodaySchedule();
          checkForUserAlert(schedule);

          // ── Next stop display ────────────────────────────────
          const nowSec   = timeToSeconds(currentISTTime);
          const firstSec = timeToSeconds(scheduleFirstTime(schedule));
          const lastSec  = timeToSeconds(scheduleLastTime(schedule));

          let next_stop = "", next_1_stop_text = "", next_2_stop_text = "";
          let flag = 0;

          // FIX (off-by-one): >= lastSec so the final stop correctly shows "closed"
          if (nowSec < firstSec || nowSec >= lastSec) {
            const nextStart = getTomorrowStartTime();
            next_stop = `Shuttle service is closed. Next bus starts at ${nextStart}`;
            flag = 1;
          } else {
            for (let i = 0; i < schedule.length - 1; i++) {
              const curSec  = timeToSeconds(schedule[i].time);
              const nextSec = timeToSeconds(schedule[i + 1].time);
              if (nowSec >= curSec && nowSec < nextSec) {
                // FIX: trim seconds from displayed times
                next_stop       = `${schedule[i+1].name} at ${fmtTime(schedule[i+1].time)}`;
                if (i+2 < schedule.length)
                  next_1_stop_text = `${schedule[i+2].name} at ${fmtTime(schedule[i+2].time)}`;
                if (i+3 < schedule.length)
                  next_2_stop_text = `${schedule[i+3].name} at ${fmtTime(schedule[i+3].time)}`;
                break;
              }
            }
            if (!next_stop) {
              const last = schedule[schedule.length - 1];
              next_stop = `${last.name} at ${fmtTime(last.time)}`;
            }
          }

          // ── Bus marker ───────────────────────────────────────
          if (busMarker) map.removeLayer(busMarker);
          const busIcon = L.divIcon({
            html: '<div style="font-size:24px;line-height:30px;text-align:center;">🚍</div>',
            className: 'emoji-marker', iconSize: [60,60], iconAnchor: [15,15]
          });
          busMarker = L.marker([lat, lon], { icon: busIcon }).addTo(map);

          const dists = Object.values(STOP_COORDS).map(c => calculateDistance(lat, lon, c.lat, c.lng));
          const zoom  = getZoomLevel(Math.min(...dists));
          if (!userPanning) map.setView([lat, lon], zoom);

          // ── Status (live vs parked) via repair channel ───────
          fetch('https://api.thingspeak.com/channels/2882525/feeds.json?api_key=ONUVVE8QBZ5GH9ZP&results=1')
            .then(r => r.json())
            .then(data1 => {
              const stale  = isGPSStale(latest.timestamp, 60);
              let statu    = stale ? "Parked" : "Live";
              const repMsg = (data1.feeds && data1.feeds.length > 0) ? (data1.feeds[0].field1 || "") : "";
              if (repMsg !== "" && repMsg.toUpperCase() !== "OK") statu = repMsg;

              const statusEl = document.getElementById("Status");
              if (statu === "Live") {
                statusEl.classList.remove("updated-time-not-live");
                statusEl.classList.add("updated-time");
                statusEl.style.color = "#188038";
              } else {
                statusEl.classList.remove("updated-time");
                statusEl.classList.add("updated-time-not-live");
                statusEl.style.color = "#c47a00";
              }
              statusEl.innerText = statu;
            })
            .catch(() => {
              const stale    = isGPSStale(latest.timestamp, 60);
              const statu    = stale ? "Parked" : "Live";
              const statusEl = document.getElementById("Status");
              statusEl.innerText = statu;
              if (statu === "Live") {
                statusEl.classList.remove("updated-time-not-live");
                statusEl.classList.add("updated-time");
                statusEl.style.color = "#188038";
              } else {
                statusEl.classList.remove("updated-time");
                statusEl.classList.add("updated-time-not-live");
                statusEl.style.color = "#c47a00";
              }
            });

          // ── Update DOM ───────────────────────────────────────
          document.getElementById("lastUpdate").innerText  = lastUpdatedIST;
          document.getElementById("Speed").innerText       = speedStr;

          const ns = document.getElementById("Nextstop");
          ns.innerText = next_stop;
          document.getElementById("next1stop").innerText  = next_1_stop_text;
          document.getElementById("next2stops").innerText = next_2_stop_text;

          const hd = document.getElementById("heading");
          if (flag) {
            hd.classList.add("yes");
            ns.style.color = "#802485";
          } else {
            hd.classList.remove("yes");
            ns.style.color = "";
          }
        })
        .catch(err => {
          console.error('Fetch Error:', err);
          document.getElementById("lastUpdate").innerText = "Error loading update.";
          document.getElementById("Speed").innerText      = "Error fetching speed.";
        });
    }

    // track user map interaction so auto-pan doesn't interrupt manual browsing
    let userPanning = false;
    map.on('dragstart zoomstart', () => { userPanning = true; });
    map.on('dragend zoomend', () => { setTimeout(() => { userPanning = false; }, 5000); });

    updateMapData();
    setInterval(updateMapData, 20000);
  </script>
</body>
</html>
