  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    html,body{height:100%;font-family:'Poppins',sans-serif;background:#f4f0f5;overflow:hidden;}
    .page-wrapper{height:100vh;display:flex;flex-direction:column;overflow:hidden;}

    /* ── Navbar ── */
    .navbar-bar{height:48px;background:#89288f;color:#fff;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:600;flex-shrink:0;position:relative;box-shadow:0 2px 8px rgba(0,0,0,.25);}
    .navbar-logo-link{position:absolute;right:10px;top:50%;transform:translateY(-50%);z-index:1100;}
    .navbar-logo-link img{height:28px;width:auto;}
    .hamburger-input{display:none;}
    .toggle{position:absolute;left:10px;top:50%;transform:translateY(-50%);height:30px;width:30px;cursor:pointer;border-radius:2px;background:#89288f;z-index:1003;}
    .toggle .common{position:absolute;height:2px;width:20px;background:#fff;border-radius:50px;transition:.4s ease;}
    .toggle .top_line{top:30%;left:50%;transform:translate(-50%,-50%);}
    .toggle .middle_line{top:50%;left:50%;transform:translate(-50%,-50%);}
    .toggle .bottom_line{top:70%;left:50%;transform:translate(-50%,-50%);}
    .hamburger-input:checked~.toggle .top_line{left:2px;top:14px;width:25px;transform:rotate(45deg);}
    .hamburger-input:checked~.toggle .bottom_line{left:2px;top:14px;width:25px;transform:rotate(-45deg);}
    .hamburger-input:checked~.toggle .middle_line{opacity:0;transform:translateX(20px);}
    .hamburger-input:checked~.slide{transform:translateX(0);}
    .slide{width:210px;height:100%;position:fixed;top:0;left:0;background:#89288f;transform:translateX(-210px);transition:.5s ease;z-index:1002;box-shadow:2px 0 12px rgba(0,0,0,.25);overflow-y:auto;}
    .slide h1{color:#ffffffe2;font-weight:700;text-align:right;padding:20px 16px 10px 0;font-size:1.1rem;pointer-events:none;}
    .slide ul{padding:0 0 20px 0;}
    .slide ul li{list-style:none;}
    .slide ul li.nav-lbl{margin-top:10px;color:#eaeaead9;font-weight:300;font-size:.78rem;padding:0 12px;}
    .slide ul li a{color:#ffffffe2;font-weight:500;padding:6px 12px;display:block;text-decoration:none;transition:.2s;}
    .slide ul li a i{width:26px;text-align:center;}
    .slide ul li:not(.nav-lbl):hover a{color:#89288f;background:#fff;}

    /* ── Main split ── */
    .main-split{flex:1;display:flex;overflow:hidden;min-height:0;}

    /* ── Map ── */
    .map-pane{position:relative;background:#e8e0ea;}
    #map{width:100%;height:100%;}
    .leaflet-control-zoom{position:absolute!important;top:10px;left:10px;z-index:900;}

    /* ── Info pane ── */
    .info-pane{
      background:linear-gradient(160deg,#faf7fb 0%,#f0eaf2 100%);
      display:flex;flex-direction:column;overflow:hidden;position:relative;
      box-shadow:-3px 0 14px rgba(137,40,143,.13);
    }
    .info-pane::before{
      content:"";position:absolute;inset:0;
      background:url('../Pics/IITDH_logo2.jpg') no-repeat center/80%;
      opacity:.08;pointer-events:none;z-index:0;
    }
    .info-inner{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;padding:18px 20px;gap:11px;overflow:hidden;}

    /* Status card */
    .status-bar{background:rgba(255,255,255,.75);border:1px solid rgba(137,40,143,.15);border-radius:10px;padding:11px 14px;display:flex;flex-direction:column;gap:5px;backdrop-filter:blur(4px);}
    .status-row{display:flex;align-items:center;justify-content:space-between;gap:8px;}
    .status-label{font-size:.75rem;color:#888;font-weight:500;white-space:nowrap;}
    .status-value{font-size:.85rem;color:#333;font-weight:600;text-align:right;font-family:'Roboto',sans-serif;}
    .status-value.live{color:#188038;} .status-value.parked{color:#c47a00;} .status-value.nosig{color:#c00;}
    #Speed,#lastUpdate{font-size:.82rem;}

    /* Next stop card */
    .next-stop-card{background:rgba(255,255,255,.75);border:1px solid rgba(137,40,143,.15);border-radius:10px;padding:12px 14px;backdrop-filter:blur(4px);}
    .card-label{font-size:.72rem;font-weight:600;color:#89288f;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;}
    .yes{display:none;}
    #Nextstop{font-size:.88rem;font-weight:600;color:#333;font-family:'Roboto',sans-serif;line-height:1.4;}
    #Nextstop.closed-col{color:#802485;}
    #next1stop,#next2stops{font-size:.8rem;color:#555;font-family:'Roboto',sans-serif;margin-top:4px;}

    /* Alert button */
    .alert-btn-wrap{display:flex;justify-content:center;}
    .alert-btn{
      display:inline-flex;align-items:center;gap:8px;
      background:#89288f;color:#fff;border:none;
      border-radius:8px;padding:9px 22px;font-size:.85rem;font-weight:600;
      cursor:pointer;transition:background .2s;font-family:'Poppins',sans-serif;
      box-shadow:0 2px 8px rgba(137,40,143,.3);
    }
    .alert-btn:hover{background:#6a1a70;}

    /* Alert modal (custom) */
    .alert-modal{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;z-index:2000;align-items:center;justify-content:center;}
    .alert-modal.show{display:flex;}
    .alert-box{background:#fff;border-radius:14px;padding:24px;max-width:380px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.2);text-align:center;}
    .alert-box h3{color:#89288f;font-size:1.1rem;font-weight:700;margin-bottom:10px;}
    .alert-box p{font-size:.9rem;color:#333;margin-bottom:18px;line-height:1.5;}
    .alert-box button{background:#89288f;color:#fff;border:none;border-radius:7px;padding:8px 24px;font-weight:600;cursor:pointer;font-family:'Poppins',sans-serif;}
    .alert-box button:hover{background:#6a1a70;}

    /* Preferences modal (Bootstrap) */
    .modal-header{border-bottom:none;padding-bottom:0;}
    .form-group{margin-bottom:14px;}
    .form-group label{font-size:.85rem;font-weight:600;margin-bottom:4px;display:block;}
    .form-group select{width:100%;padding:8px 10px;border-radius:7px;border:1px solid #ddd;font-size:.85rem;font-family:'Poppins',sans-serif;}

    /* Footer */
    .info-footer{flex-shrink:0;padding:9px 14px;background:rgba(255,255,255,.6);border-top:1px solid rgba(137,40,143,.1);display:flex;flex-direction:column;gap:3px;position:relative;z-index:1;}
    .info-footer a{color:#89288f;text-decoration:underline;font-weight:500;}
    .info-footer p{font-size:.72rem;color:#666;margin:0;}

    /* ── Desktop ≥ 768px ── */
    @media(min-width:768px){
      .map-pane{width:60%;height:100%;}
      .info-pane{width:40%;}
      .info-inner{padding:22px 24px;gap:14px;}
    }

    /* ── Mobile < 768px ── */
    @media(max-width:767px){
      .main-split{flex-direction:column;}
      .map-pane{width:100%;height:45dvh;flex-shrink:0;}
      .info-pane{width:100%;flex:1;min-height:0;}
      .info-inner{padding:10px 12px;gap:8px;}
      .status-bar{padding:8px 10px;gap:3px;}
      .status-label{font-size:.7rem;}
      .status-value{font-size:.78rem;}
      #Speed,#lastUpdate{font-size:.76rem;}
      .next-stop-card{padding:9px 10px;}
      #Nextstop{font-size:.82rem;}
      #next1stop,#next2stops{font-size:.74rem;}
      .alert-btn{font-size:.8rem;padding:8px 16px;}
      .info-footer p{font-size:.68rem;}
    }
  </style>
</head>

  <!-- Custom alert popup -->

  <script>
    var map = L.map('map').setView([15.484624, 74.936509], 13);
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19, attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    let tailMarkerGroup = L.layerGroup().addTo(map);
    var busMarker = null;

    var stopIcon = L.divIcon({
      html: '<div style="font-size:22px;line-height:28px;text-align:center;">🚏</div>',
      className: '', iconSize: [28,28], iconAnchor: [14,14]
    });
    Object.entries(STOP_COORDS).forEach(([label, c]) => {
      const m = L.marker([c.lat, c.lng], { icon: stopIcon }).addTo(map);
      m.bindPopup(`<div style="font-size:13px;font-weight:600;font-family:'Poppins',sans-serif;color:#202124;">${label}</div>`).openPopup();
    });

    let userPreferences = {
      fromLocation: localStorage.getItem('fromLocation') || '',
      toLocation:   localStorage.getItem('toLocation')   || '',
      alertShown:   false
    };
    if (userPreferences.fromLocation) document.getElementById('fromLocation').value = userPreferences.fromLocation;
    if (userPreferences.toLocation)   document.getElementById('toLocation').value   = userPreferences.toLocation;

    const alertModal   = document.getElementById('alertModal');
    const alertMessage = document.getElementById('alertMessage');
    document.getElementById('closeAlert').addEventListener('click', () => alertModal.classList.remove('show'));
    alertModal.addEventListener('click', e => { if (e.target === alertModal) alertModal.classList.remove('show'); });

    document.getElementById('savePreferences').addEventListener('click', () => {
      userPreferences.fromLocation = document.getElementById('fromLocation').value;
      userPreferences.toLocation   = document.getElementById('toLocation').value;
      if (userPreferences.fromLocation && userPreferences.toLocation &&
          userPreferences.fromLocation === userPreferences.toLocation) {
        alert('"From" and "To" locations must be different.');
        return;
      }
      userPreferences.alertShown = false;
      localStorage.setItem('fromLocation', userPreferences.fromLocation);
      localStorage.setItem('toLocation',   userPreferences.toLocation);
      if (userPreferences.fromLocation && userPreferences.toLocation) {
        alert('Alert saved! You will be notified when the bus is ~10 min from your stop.');
      } else {
        alert('Please select both From and To locations.');
      }
    });

    function showAlert(message) {
      if (!userPreferences.alertShown) {
        alertMessage.textContent = message;
        alertModal.classList.add('show');
        userPreferences.alertShown = true;
        setTimeout(() => { userPreferences.alertShown = false; }, 300000);
      }
    }

    function checkForUserAlert(schedule) {
      if (!userPreferences.fromLocation || !userPreferences.toLocation) return;
      const { timeStr } = getCurrentIST();
      const nowSec = timeToSeconds(timeStr);
      const fromIndices = schedule.reduce((acc, stop, i) => {
        if (stop.name === userPreferences.fromLocation) acc.push(i); return acc;
      }, []);
      if (fromIndices.length === 0) return;
      for (const fromIndex of fromIndices) {
        const toIndex = schedule.findIndex((s, i) => s.name === userPreferences.toLocation && i > fromIndex);
        if (toIndex === -1) continue;
        const fromSec = timeToSeconds(schedule[fromIndex].time);
        if (nowSec >= (fromSec - 600) && nowSec < fromSec) {
          showAlert(`Bus arrives at ${userPreferences.fromLocation} in ${Math.ceil((fromSec - nowSec) / 60)} min → ${userPreferences.toLocation}`);
          return;
        } else if (nowSec >= fromSec && nowSec < fromSec + 60) {
          showAlert(`Bus has arrived at ${userPreferences.fromLocation}.`);
          return;
        }
      }
    }

    function updateMapData() {
      fetch('https://api.thingspeak.com/channels/2500568/feeds.json?api_key=3TVTGFNPIZH5T08Y&results=5')
        .then(r => r.json())
        .then(data => {
          const feeds = data.feeds.slice(-5).map(f => ({
            latitude:  parseFloat(f.field1),
            longitude: parseFloat(f.field2),
            speed:     parseInt(f.field3, 10),
            timestamp: f.created_at
          }));

          const latest = feeds[feeds.length - 1];

          if (!isFinite(latest.latitude) || !isFinite(latest.longitude)) {
            document.getElementById('lastUpdate').innerText = 'GPS signal lost — retrying…';
            const sEl = document.getElementById('Status');
            sEl.textContent = 'No Signal'; sEl.className = 'status-value nosig';
            return;
          }

          tailMarkerGroup.clearLayers();
          feeds.slice(0, 4).forEach((entry, i) => {
            if (!isFinite(entry.latitude) || !isFinite(entry.longitude)) return;
            const icon = L.divIcon({
              html: `<div style="font-size:16px;opacity:${TRAIL_OPACITIES[i]}">🔹</div>`,
              iconSize: [22,22], iconAnchor: [11,11], className: ''
            });
            L.marker([entry.latitude, entry.longitude], { icon }).addTo(tailMarkerGroup);
          });

          const lat = latest.latitude, lon = latest.longitude;
          const spd = latest.speed;
          const speedStr = isFinite(spd) ? spd + ' km/h' : '—';
          const lastUpdatedIST = utcToISTString(latest.timestamp);
          const { timeStr: currentISTTime, dayName, dateKey } = getCurrentIST();
          const schedule = getTodaySchedule();

          checkForUserAlert(schedule);

          const nowSec   = timeToSeconds(currentISTTime);
          const firstSec = timeToSeconds(scheduleFirstTime(schedule));
          const lastSec  = timeToSeconds(scheduleLastTime(schedule));

          let next_stop = '', next_1 = '', next_2 = '', flag = 0;

          if (nowSec < firstSec || nowSec > lastSec) {
            next_stop = 'Shuttle service is closed. Next bus from ' + getTomorrowStartTime();
            flag = 1;
          } else {
            for (let i = 0; i < schedule.length - 1; i++) {
              const curSec  = timeToSeconds(schedule[i].time);
              const nextSec = timeToSeconds(schedule[i+1].time);
              if (nowSec >= curSec && nowSec < nextSec) {
                next_stop = `${schedule[i+1].name}  ·  ${schedule[i+1].time}`;
                if (i+2 < schedule.length) next_1 = `${schedule[i+2].name}  ·  ${schedule[i+2].time}`;
                if (i+3 < schedule.length) next_2 = `${schedule[i+3].name}  ·  ${schedule[i+3].time}`;
                break;
              }
            }
            if (!next_stop) {
              const last = schedule[schedule.length-1];
              next_stop = `${last.name}  ·  ${last.time}`;
            }
          }

          if (busMarker) map.removeLayer(busMarker);
          const busIcon = L.divIcon({
            html: '<div style="font-size:26px;line-height:32px;text-align:center;">🚍</div>',
            className: '', iconSize: [32,32], iconAnchor: [16,16]
          });
          busMarker = L.marker([lat, lon], { icon: busIcon }).addTo(map);

          const dists = Object.values(STOP_COORDS).map(c => calculateDistance(lat, lon, c.lat, c.lng));
          if (!userPanning) map.setView([lat, lon], getZoomLevel(Math.min(...dists)));

          fetch('https://api.thingspeak.com/channels/2882525/feeds.json?api_key=ONUVVE8QBZ5GH9ZP&results=1')
            .then(r => r.json())
            .then(data1 => {
              const stale = isGPSStale(latest.timestamp, 300);
              let statu = stale ? 'Parked' : 'Live';
              const repMsg = (data1.feeds && data1.feeds.length > 0) ? (data1.feeds[0].field1 || '') : '';
              if (repMsg !== '' && repMsg.toUpperCase() !== 'OK') statu = repMsg;
              const el = document.getElementById('Status');
              el.textContent = statu;
              el.className = 'status-value ' + (statu === 'Live' ? 'live' : 'parked');
            })
            .catch(() => {
              const statu = isGPSStale(latest.timestamp, 300) ? 'Parked' : 'Live';
              const el = document.getElementById('Status');
              el.textContent = statu;
              el.className = 'status-value ' + (statu === 'Live' ? 'live' : 'parked');
            });

          document.getElementById('lastUpdate').innerText = lastUpdatedIST;
          document.getElementById('Speed').innerText = speedStr;

          const ns = document.getElementById('Nextstop');
          ns.innerText = next_stop;
          ns.className = flag ? 'closed-col' : '';
          document.getElementById('next1stop').innerText = next_1;
          document.getElementById('next2stops').innerText = next_2;

          const hd = document.getElementById('heading');
          hd.className = flag ? 'card-label yes' : 'card-label';
        })
        .catch(err => {
          console.error('Fetch Error:', err);
          document.getElementById('lastUpdate').innerText = 'Error loading update.';
          document.getElementById('Speed').innerText = '—';
        });
    }

    let userPanning = false;
    map.on('dragstart zoomstart', () => { userPanning = true; });
    map.on('dragend zoomend',     () => { setTimeout(() => { userPanning = false; }, 5000); });

    updateMapData();
    setInterval(updateMapData, 60000);
  </script>
</body>
</html>
