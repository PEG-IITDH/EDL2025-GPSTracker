<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="../Pics/minecraftt_compass.png">
  <title>Bus Tracking System — Under Maintenance</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { font-family:'Poppins',sans-serif; background:#f4f0f5; height:100%; }
    .page-wrapper { height:100vh; display:flex; flex-direction:column; }

    /* NAVBAR */
    .navbar-bar {
      height:48px; background-color:#89288f; color:white;
      display:flex; align-items:center; justify-content:center;
      font-size:1rem; font-weight:600; position:relative;
      flex-shrink:0; box-shadow:0 2px 8px rgba(0,0,0,0.25);
    }
    .navbar-logo-link { position:absolute; right:10px; top:50%; transform:translateY(-50%); }
    .navbar-logo-link img { height:28px; width:auto; }

    .hamburger-input { display:none; }
    .toggle {
      position:absolute; left:10px; top:50%; transform:translateY(-50%);
      height:30px; width:30px; cursor:pointer; border-radius:2px;
      background:#89288f; z-index:1003;
    }
    .toggle .common { position:absolute; height:2px; width:20px; background:white; border-radius:50px; transition:0.4s ease; }
    .toggle .top_line    { top:30%; left:50%; transform:translate(-50%,-50%); }
    .toggle .middle_line { top:50%; left:50%; transform:translate(-50%,-50%); }
    .toggle .bottom_line { top:70%; left:50%; transform:translate(-50%,-50%); }
    .hamburger-input:checked ~ .toggle .top_line    { left:2px; top:14px; width:25px; transform:rotate(45deg); }
    .hamburger-input:checked ~ .toggle .bottom_line { left:2px; top:14px; width:25px; transform:rotate(-45deg); }
    .hamburger-input:checked ~ .toggle .middle_line { opacity:0; transform:translateX(20px); }
    .hamburger-input:checked ~ .slide               { transform:translateX(0); }

    .slide {
      width:210px; height:100%; position:fixed; top:0; left:0;
      background:#89288f; transform:translateX(-210px);
      transition:transform 0.4s ease; z-index:1002;
      overflow-y:auto; box-shadow:2px 0 12px rgba(0,0,0,0.25);
    }
    .slide h1 { color:#ffffffe2; font-weight:700; text-align:right; padding:18px 16px 10px 0; font-size:1.2rem; }
    .slide ul { padding-bottom:24px; }
    .slide ul li { list-style:none; }
    .slide ul li.section-label { margin-top:12px; color:#eaeaead9; font-weight:300; font-size:0.75rem; padding:0 12px; }
    .slide ul li a { color:#ffffffe2; font-weight:500; padding:6px 12px; display:block; text-decoration:none; transition:0.2s; }
    .slide ul li a i { width:26px; text-align:center; }
    .slide ul li:not(.section-label):hover a { color:#89288f; background:white; }
    .slide ul li:not(.section-label):hover a i { color:#89288f; }

    /* MAIN CONTENT */
    .main-content {
      flex:1; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      padding:20px 24px 32px; position:relative; overflow:hidden; gap:0;
    }
    .main-content::before {
      content:""; position:fixed; top:48px; left:0; right:0; bottom:0;
      background:url('../Pics/IITDH_logo.png') no-repeat center / 45%;
      opacity:0.13; pointer-events:none; z-index:0;
    }
    .main-content > * { position:relative; z-index:1; }

    .logos-row { width:100%; display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; }
    .logos-left { display:flex; align-items:center; gap:10px; }
    .iit-logo { width:62px; height:auto; }
    .logos-right img { width:58px; height:auto; }

    .maintenance-card { display:flex; flex-direction:column; align-items:center; gap:18px; width:100%; max-width:520px; text-align:center; }

    .gear-wrap { position:relative; width:72px; height:72px; }
    .gear-wrap .gear-main { font-size:72px; color:#89288f; animation:spin 6s linear infinite; display:block; line-height:1; }
    .gear-wrap .gear-small { position:absolute; font-size:30px; color:#b35ab9; bottom:-4px; right:-10px; animation:spin-rev 4s linear infinite; }
    @keyframes spin     { from{ transform:rotate(0deg); }   to{ transform:rotate(360deg); } }
    @keyframes spin-rev { from{ transform:rotate(0deg); }   to{ transform:rotate(-360deg); } }

    .maintenance-title { font-size:1.75rem; font-weight:700; color:#89288f; line-height:1.2; }
    .maintenance-sub { font-size:1rem; font-weight:500; color:#444; line-height:1.5; }
    .maintenance-sub span { color:#89288f; font-weight:600; }

    .progress-wrap { width:100%; max-width:340px; }
    .progress-label { font-size:0.78rem; font-weight:500; color:#666; margin-bottom:6px; text-align:left; }
    .progress-track { width:100%; height:6px; background:#e0d5e1; border-radius:99px; overflow:hidden; }
    .progress-bar { height:100%; width:65%; background:linear-gradient(90deg,#89288f,#c46bcc); border-radius:99px; animation:pulse-bar 2.5s ease-in-out infinite; }
    @keyframes pulse-bar { 0%,100%{ opacity:1; } 50%{ opacity:0.6; } }

    .divider { width:48px; height:2px; background:#c9a2cc; border-radius:99px; }
    .contact-note { font-size:0.82rem; color:#555; }
    .contact-note a { color:#802485; text-decoration:underline; }
    .contact-note a:hover { color:#89288f; }

    @media (max-width:600px) {
      html, body { height:auto; overflow:auto; }
      .page-wrapper { height:auto; min-height:100dvh; overflow:visible; }
      .main-content { padding:16px 14px 24px; justify-content:flex-start; }
      .logos-row { margin-bottom:20px; padding-top:8px; }
      .iit-logo { width:50px; }
      .logos-right img { width:46px; }
      .maintenance-title { font-size:1.3rem; }
      .maintenance-sub { font-size:0.92rem; }
      .gear-wrap { width:56px; height:56px; }
      .gear-wrap .gear-main { font-size:56px; }
      .gear-wrap .gear-small { font-size:24px; }
    }
  </style>
</head>

      </div>
      <div class="slide">
        <h1>Menu</h1>

          <li class="section-label">More Information</li>
          <li><a href="About.html"><i class="fa-solid fa-circle-info"></i> About</a></li>
        </ul>
      </div>
    </label>
      Main Menu
      <a href="https://www.iitdh.ac.in/hi" target="_blank" class="navbar-logo-link">
        <img src="../Pics/logo-intranet-white.png" alt="IIT DH">
      </a>
    </nav>
    <div class="main-content">
      <div class="logos-row">
        <div class="logos-left">
          <img src="../Pics/only_logo.png" alt="IITDH Logo" class="iit-logo">
        </div>
        <div class="logos-right">
          <img src="../Pics/electronics_club_logo.png" alt="Electronics Club">
        </div>
      </div>
      <div class="maintenance-card">
        <div class="gear-wrap">
          <i class="fas fa-gear gear-main"></i>
          <i class="fas fa-gear gear-small"></i>
        </div>
        <div class="maintenance-title">Service Under Maintenance</div>
        <p class="maintenance-sub">
          We're working hard to get the <span>service</span> back up and running.<br>
          We'll be back as soon as possible — thank you for your patience!
        </p>
        <div class="progress-wrap">
          <div class="progress-label">Restoration in progress…</div>
          <div class="progress-track"><div class="progress-bar"></div></div>
        </div>
        <div class="divider"></div>
        <p class="contact-note">
          Questions? Reach us at
          <a href="mailto:ee23bt041@iitdh.ac.in">ee23bt041@iitdh.ac.in</a>
        </p>
      </div>
    </div>
  </div>
</body>
</html>
